server:
  port: 8080
  mode: debug  # debug, release, test
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

database:
  host: localhost
  port: 5432
  name: kiqi
  user: shenfay
  password: postgres
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: smLuhX79IBihMgtVucmefmdP8Gt8hshA  # 请根据实际情况修改
  access_expire: 30m
  refresh_expire: 168h  # 7 天
  issuer: kiqi

asynq:
  addr: localhost:6379
  concurrency: 10
  queues:
    critical: 6
    default: 3
    logs: 4
    notification: 4
    low: 1

logger:
  level: debug
  format: console  # json, console
  output_path: server/logs/app.log  # 日志文件路径

# CORS 配置
cors:
  allowed_origins: ["http://localhost:5173", "http://localhost:8080"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["Authorization", "Content-Type", "X-Requested-With"]
  allow_credentials: true
  max_age: 3600

# 速率限制配置
rate_limit:
  enabled: true
  general:
    rate: 60        # 每分钟 60 次
    burst: 100      # 突发 100 次
  login:
    rate: 5         # 每分钟 5 次
    burst: 10       # 突发 10 次
  register:
    rate: 10        # 每分钟 10 次
    burst: 20       # 突发 20 次

# 认证配置
auth:
  max_devices_per_user: 5           # 每个用户最多登录设备数
  auto_revoke_oldest: false         # 是否自动踢出最旧设备
  email_verification_expire: 24h    # 邮箱验证 token 过期时间
  password_reset_expire: 1h         # 密码重置 token 过期时间

# 邮件配置
email:
  from: noreply@example.com
  verification_url_template: "http://localhost:3000/verify-email?token=%s&user_id=%s"
  password_reset_url_template: "http://localhost:3000/reset-password?token=%s&user_id=%s"
